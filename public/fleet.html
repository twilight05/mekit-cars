<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Showroom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="site-header-mount"></div>

  <section class="page-hero">
    <div class="page-hero-inner">
      <p class="hero-eyebrow">Showroom</p>
      <h1>Find Your Ideal Ride</h1>
      <p class="hero-lead">Filter our fleet and tap <strong>Rent Now</strong> on any vehicle to book instantly.</p>
    </div>
  </section>

  <div class="favourites-banner hidden" id="fav-banner">
    <a href="#" id="fav-link">View saved vehicles (<span id="fav-count">0</span>)</a>
  </div>

  <section class="filters-panel">
    <div class="filters-panel-inner">
      <p class="filters-label">Refine your search</p>
      <div class="filters-bar">
        <div class="search-row">
          <div class="field" style="grid-column: 1 / -1">
            <label for="search">Search</label>
            <input type="search" id="search" placeholder="Make, model, or keyword">
          </div>
          <div class="field">
            <label for="filter-make">Make</label>
            <select id="filter-make"><option value="">All makes</option></select>
          </div>
          <div class="field">
            <label for="filter-body">Body type</label>
            <select id="filter-body"><option value="">All types</option></select>
          </div>
          <div class="field">
            <label for="filter-year">Year</label>
            <select id="filter-year"><option value="">Any year</option></select>
          </div>
        </div>
        <div class="search-row" style="grid-template-columns: 1fr 1fr">
          <div class="field">
            <label for="filter-min-price">Min price</label>
            <input type="number" id="filter-min-price" placeholder="Minimum" min="0">
          </div>
          <div class="field">
            <label for="filter-max-price">Max price</label>
            <input type="number" id="filter-max-price" placeholder="Maximum" min="0">
          </div>
        </div>
        <div class="filter-actions">
          <label class="toggle-label"><input type="checkbox" id="show-sold"> Include sold</label>
          <label class="toggle-label hidden" id="fav-only-wrap"><input type="checkbox" id="fav-only"> Saved only</label>
          <button type="button" class="btn btn-ghost btn-sm" id="clear-filters">Reset</button>
        </div>
      </div>
    </div>
  </section>

  <main class="listings">
    <div class="listings-header hidden" id="listings-header">
      <h2>Our inventory</h2>
      <span class="listings-count" id="listings-count"></span>
    </div>
    <div id="loading" class="loading">Loading vehicles…</div>
    <div id="grid" class="inventory-grid hidden"></div>
    <div id="empty" class="empty-state hidden">
      <h3>No vehicles match</h3>
      <p>Try adjusting your filters.</p>
    </div>
  </main>

  <div id="site-footer-mount"></div>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    let debounceTimer;

    function updateFavBanner() {
      const favs = getFavourites();
      const banner = document.getElementById('fav-banner');
      const wrap = document.getElementById('fav-only-wrap');
      if (favs.length) {
        banner.classList.remove('hidden');
        wrap.classList.remove('hidden');
        document.getElementById('fav-count').textContent = favs.length;
        document.getElementById('fav-link').onclick = (e) => {
          e.preventDefault();
          document.getElementById('fav-only').checked = true;
          loadCars();
        };
      } else {
        banner.classList.add('hidden');
        wrap.classList.add('hidden');
      }
    }

    function populateFilters(meta) {
      meta.makes.forEach((m) => {
        const o = document.createElement('option');
        o.value = m; o.textContent = m;
        document.getElementById('filter-make').appendChild(o);
      });
      meta.bodyTypes.forEach((b) => {
        const o = document.createElement('option');
        o.value = b; o.textContent = b;
        document.getElementById('filter-body').appendChild(o);
      });
      meta.years.forEach((y) => {
        const o = document.createElement('option');
        o.value = y; o.textContent = y;
        document.getElementById('filter-year').appendChild(o);
      });
    }

    function buildQuery() {
      const params = new URLSearchParams();
      const v = (id) => document.getElementById(id).value;
      if (v('search').trim()) params.set('search', v('search').trim());
      if (v('filter-make')) params.set('make', v('filter-make'));
      if (v('filter-body')) params.set('body_type', v('filter-body'));
      if (v('filter-year')) params.set('year', v('filter-year'));
      if (v('filter-min-price')) params.set('min_price', v('filter-min-price'));
      if (v('filter-max-price')) params.set('max_price', v('filter-max-price'));
      if (document.getElementById('show-sold').checked) params.set('include_sold', 'true');
      return params.toString();
    }

    async function loadCars() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('grid').classList.add('hidden');
      document.getElementById('empty').classList.add('hidden');
      document.getElementById('listings-header').classList.add('hidden');

      let cars = await api(`/api/cars?${buildQuery()}`);
      if (document.getElementById('fav-only')?.checked) {
        const favs = getFavourites();
        cars = cars.filter((c) => favs.includes(c.id));
      }

      document.getElementById('loading').classList.add('hidden');
      if (!cars.length) {
        document.getElementById('empty').classList.remove('hidden');
        return;
      }

      document.getElementById('listings-header').classList.remove('hidden');
      document.getElementById('listings-count').textContent = `${cars.length} vehicle${cars.length === 1 ? '' : 's'}`;

      const grid = document.getElementById('grid');
      grid.innerHTML = cars.map((c) => renderCarCard(c)).join('');
      grid.classList.remove('hidden');
      bindCarCards(grid);
    }

    async function init() {
      try {
        const meta = await api('/api/cars/meta/filters');
        await initPage({ title: 'Showroom', active: 'Showroom' });
        populateFilters(meta);
        const savedBody = sessionStorage.getItem('fleet_body_filter');
        if (savedBody) {
          document.getElementById('filter-body').value = savedBody;
          sessionStorage.removeItem('fleet_body_filter');
        }
        await loadCars();
        updateFavBanner();
      } catch (e) {
        document.getElementById('loading').textContent = 'Unable to load fleet. Run npm start.';
      }
    }

    ['search', 'filter-make', 'filter-body', 'filter-year', 'filter-min-price', 'filter-max-price', 'show-sold', 'fav-only']
      .forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.addEventListener(el.type === 'search' || el.type === 'number' ? 'input' : 'change', () => {
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(loadCars, 280);
        });
      });

    document.getElementById('clear-filters').addEventListener('click', () => {
      ['search', 'filter-make', 'filter-body', 'filter-year', 'filter-min-price', 'filter-max-price'].forEach((id) => {
        document.getElementById(id).value = '';
      });
      document.getElementById('show-sold').checked = false;
      document.getElementById('fav-only').checked = false;
      loadCars();
    });

    init();
  </script>
</body>
</html>
