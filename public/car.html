<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="site-header-mount"></div>

  <main id="content">
    <div class="loading">Loading vehicle…</div>
  </main>

  <div id="site-footer-mount"></div>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    const carId = new URLSearchParams(location.search).get('id');

    async function load() {
      await initPage({ title: 'Vehicle', active: 'Showroom' });

      if (!carId) {
        document.getElementById('content').innerHTML = '<div class="empty-state"><h3>Invalid link</h3><p><a href="/fleet.html">Back to showroom</a></p></div>';
        return;
      }

      try {
        const car = await api(`/api/cars/${carId}`);
        document.title = `${car.title} — ${cachedSettings.company_name}`;
        render(car, cachedSettings);
      } catch (e) {
        document.getElementById('content').innerHTML = '<div class="empty-state"><h3>Vehicle not found</h3><p><a href="/fleet.html">Back to showroom</a></p></div>';
      }
    }

    function render(car, settings) {
      const imgs = car.images.length ? car.images : [PLACEHOLDER_IMAGE];
      const sold = car.status === 'sold';
      const mainSrc = imageUrl(imgs[0]);

      document.getElementById('content').innerHTML = `
        <div class="product-layout">
          <div class="product-details">
            <a href="/fleet.html" class="back-link">← Back to showroom</a>

            <div class="gallery">
              <div class="gallery-main">
                ${sold ? '<span class="badge-sold" style="position:absolute;z-index:2;margin:16px">Sold</span>' : ''}
                <img id="main-img" src="${mainSrc}" alt="${car.title.replace(/"/g, '')}" onerror="this.onerror=null;this.src='${PLACEHOLDER_IMAGE}'">
              </div>
              ${imgs.length > 1 ? `
              <div class="gallery-thumbs" id="thumbs">
                ${imgs.map((src, i) => {
                  const u = imageUrl(src);
                  return `<img src="${u}" data-src="${u}" class="${i === 0 ? 'active' : ''}" alt="View ${i + 1}">`;
                }).join('')}
              </div>` : ''}
            </div>

            <div class="product-header">
              <p class="product-eyebrow">${car.body_type} · ${car.year}</p>
              <h1>${car.title}</h1>
              <div class="product-price">${formatPrice(car.price)}</div>
            </div>

            <div class="product-specs">
              <div class="spec-item"><div class="label">Make</div><div class="value">${car.make}</div></div>
              <div class="spec-item"><div class="label">Model</div><div class="value">${car.model}</div></div>
              <div class="spec-item"><div class="label">Year</div><div class="value">${car.year}</div></div>
              <div class="spec-item"><div class="label">Status</div><div class="value">${sold ? 'Sold' : 'Available'}</div></div>
              ${car.mileage ? `<div class="spec-item"><div class="label">Mileage</div><div class="value">${car.mileage.toLocaleString()} km</div></div>` : ''}
              ${car.fuel ? `<div class="spec-item"><div class="label">Fuel</div><div class="value">${car.fuel}</div></div>` : ''}
              ${car.transmission ? `<div class="spec-item"><div class="label">Transmission</div><div class="value">${car.transmission}</div></div>` : ''}
            </div>

            <p class="product-desc">${car.description || 'Contact us for full specifications.'}</p>
            ${sold ? '<div class="alert alert-error" style="margin-top:20px">This vehicle is sold. Rent another from our showroom or inquire for alternatives.</div>' : ''}
          </div>

          <aside class="product-sidebar">
            <div class="inquiry-box">
              <h2>Rent this vehicle</h2>
              <p>Tap Rent Now to open WhatsApp with full vehicle details, or fill in the form below.</p>
              <button type="button" class="btn btn-rent btn-block" id="rent-btn" style="margin-bottom:20px">Rent Now</button>
              <div id="form-alert" class="hidden"></div>
              <form id="inquiry-form">
                <div class="form-group">
                  <label for="name">Full name</label>
                  <input type="text" id="name" required autocomplete="name">
                </div>
                <div class="form-group">
                  <label for="phone">Phone</label>
                  <input type="tel" id="phone" required autocomplete="tel" placeholder="08012345678">
                </div>
                <div class="form-group">
                  <label for="dates">Dates / duration</label>
                  <input type="text" id="dates" placeholder="e.g. 15 June, 2 days">
                </div>
                <div class="form-group">
                  <label for="message">Notes</label>
                  <textarea id="message" placeholder="Event, pickup location…"></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Submit inquiry</button>
              </form>
            </div>
          </aside>
        </div>
      `;

      document.getElementById('thumbs')?.querySelectorAll('img').forEach((thumb) => {
        thumb.addEventListener('click', () => {
          document.getElementById('main-img').src = thumb.dataset.src;
          document.querySelectorAll('.gallery-thumbs img').forEach((t) => t.classList.remove('active'));
          thumb.classList.add('active');
        });
      });

      document.getElementById('rent-btn').addEventListener('click', () => rentCar(car.id, document.getElementById('rent-btn')));

      document.getElementById('inquiry-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        await submitWhatsAppForm('/api/inquiries', {
          car_id: Number(carId),
          name: document.getElementById('name').value,
          phone: document.getElementById('phone').value,
          dates: document.getElementById('dates').value,
          message: document.getElementById('message').value
        }, document.getElementById('submit-btn'), 'Your inquiry is ready — tap send in WhatsApp.');
      });
    }

    load();
  </script>
</body>
</html>
